<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Chat - NeuroStack</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
    .dashboard-header { display: flex; align-items: center; gap: 10px; padding: 10px; background-color: #111; }
    .dashboard-header .logo { width: 40px; }
    .dashboard-content { padding: 15px; }
    
    #users-list {
      max-height: 200px;
      overflow-y: auto;
      border-bottom: 1px solid #00BFFF;
      margin-bottom: 15px;
    }
    .user-item {
      padding: 8px;
      cursor: pointer;
      border-radius: 8px;
    }
    .user-item:hover { background-color: #00BFFF22; }

    #messages-container {
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 8px;
      background-color: #111;
      margin-bottom: 10px;
    }
    .message { margin-bottom: 8px; padding: 6px 10px; border-radius: 8px; word-break: break-word; }
    .message.user { background-color: #00BFFF22; }
    .message.admin { background-color: #00BFFF44; text-align: right; }

    #reply-input { width: 100%; padding: 8px; border-radius: 8px; border: none; margin-bottom: 8px; resize: none; }
    #send-reply {
      background-color: #00BFFF;
      color: #000;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    #send-reply:hover { background-color: #009ACD; }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #111;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .bottom-nav a { color: #00BFFF; text-decoration: none; font-weight: bold; }

    /* Light theme classes handled by JS */
    .light-theme { background-color: #fff; color: #000; }
    .light-theme #messages-container { background-color: #eee; color: #000; }
    .light-theme .message.user { background-color: #00BFFF33; }
    .light-theme .message.admin { background-color: #00BFFF55; text-align: right; }
  </style>
</head>
<body>

  <header class="dashboard-header">
    <img src="file_00000000a054724688f05571cf680672.png" alt="NeuroStack Logo" class="logo">
    <h1>Admin Chat</h1>
  </header>

  <main class="dashboard-content">
    <section id="chat-section">
      <h2>Users</h2>
      <div id="users-list">
        <p>Loading users...</p>
      </div>

      <h2>Messages</h2>
      <div id="messages-container">
        <p>Select a user to view messages</p>
      </div>

      <textarea id="reply-input" placeholder="Type your reply..." disabled></textarea>
      <button id="send-reply" disabled>Send Reply</button>
    </section>
  </main>

  <nav class="bottom-nav">
    <a  href="admin.html">🏠 Home</a>
    <a href="admin-reviews.html">📊 Review</a>
    <a class="active"  href="admin-chat.html">💬 Chat</a>
    <a href="admin-settings.html">⚙️ Settings</a>
  </nav>

  <!-- Firebase + Admin JS -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="admin.js"></script>

</body>
</html>
