<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroStack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="splash-screen">
    <img src="file_00000000a054724688f05571cf680672.png" alt="NeuroStack Logo" class="logo">
    <h1>NeuroStack</h1>
  </div>

  <script src="firebase.js"></script>
  <script src="auth.js"></script>
  <script>
    // Simple login check simulation
    setTimeout(() => {
      const loggedIn = localStorage.getItem('loggedIn'); // placeholder
      if(loggedIn) {
        window.location.href = "home.html";
      } else {
        window.location.href = "login.html";
      }
    }, 4000); // 4-second splash
  </script>
</body>
</html>
